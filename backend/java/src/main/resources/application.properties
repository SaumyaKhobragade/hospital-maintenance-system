# Database config
# Defaults to an in-memory H2 database so the app starts locally without Postgres.
# Override these with SUPABASE_DB_URL / SUPABASE_DB_USER / SUPABASE_DB_PASSWORD when you want a real database.
spring.datasource.url=${SUPABASE_DB_URL:jdbc:h2:mem:hms;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
spring.datasource.username=${SUPABASE_DB_USER:sa}
spring.datasource.password=${SUPABASE_DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update

# Use a lightweight cache by default; switch to redis via CACHE_TYPE=redis if needed.
spring.cache.type=${CACHE_TYPE:simple}

# Policy sync (set to false to disable Supabase policy sync)
supabase.policy.sync.enabled=${SUPABASE_POLICY_SYNC_ENABLED:true}
supabase.policy.sync.interval=30000

# Async config — allow SSE threads to not block Spring's servlet thread pool
spring.mvc.async.request-timeout=-1

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false