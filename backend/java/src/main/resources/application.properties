server.port=8080

# Supabase Config (replace with real values or use env vars)
supabase.url=${SUPABASE_URL:https://your-project.supabase.co}
supabase.anon.key=${SUPABASE_ANON_KEY:your-anon-key-here}

# Policy sync (set to false to disable Supabase policy sync)
supabase.policy.sync.enabled=${SUPABASE_POLICY_SYNC_ENABLED:false}
supabase.policy.sync.interval=30000

# Async config — allow SSE threads to not block Spring's servlet thread pool
spring.mvc.async.request-timeout=-1

# Jackson
spring.jackson.serialization.fail-on-empty-beans=false
